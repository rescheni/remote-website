server:
  addr: "your-server.com:8443"
  tls: false
  secret: ""

client:
  id: "my-phone"
  heartbeat_interval: "30s"
  reconnect_backoff:
    - "1s"
    - "2s"
    - "5s"
    - "10s"
    - "30s"

routes:
  - host: "app1.example.com"
    target: "http://localhost:3000"
  - host: "www.example.com"
    path_prefix: "/service-b"
    target: "http://localhost:8080"
